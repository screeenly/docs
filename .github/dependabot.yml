version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: monthly
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: monthly
    time: '02:00'
  open-pull-requests-limit: 15
  groups:
    npm-prod-dependencies:
      dependency-type: "production"
      update-types:
        - "minor"
        - "patch"
    npm-dev-dependencies:
      dependency-type: "development"
      update-types:
        - "minor"
        - "patch"
